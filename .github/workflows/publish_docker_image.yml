name: Build and Deploy Evolution Go

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: evolution-go-main
  cancel-in-progress: true

jobs:
  build_and_push:
    name: Build and push image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/tbdevmaster/evolution-go-recebafacil
          tags: |
            type=raw,value=main
            type=sha,format=long,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy_vps:
    name: Deploy on VPS
    runs-on: ubuntu-latest
    needs: build_and_push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            set -e

            echo "${{ secrets.GHCR_READ_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            cd /docker/evolution-go-qtd2

            docker compose pull api
            docker compose up -d api

            echo "== container status =="
            docker ps --filter name=evolution-go-qtd2-api-1 --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}'

            echo "== waiting for api =="
            ATTEMPTS=0
            until [ $ATTEMPTS -ge 20 ]
            do
              if docker exec evolution-go-qtd2-api-1 sh -c 'wget -qO- http://127.0.0.1:4000 >/dev/null 2>&1 || nc -z 127.0.0.1 4000 >/dev/null 2>&1'; then
                break
              fi
              ATTEMPTS=$((ATTEMPTS+1))
              sleep 3
            done

            echo "== health check /instance/all =="
            set -a
            . ./.env
            set +a
            curl -fsS -H "apikey: $API_KEY" http://127.0.0.1:4000/instance/all >/dev/null

            echo "== recent logs =="
            docker logs --tail 80 evolution-go-qtd2-api-1 2>&1 | sed -E 's/([A-Za-z0-9_\-]{20,})/[REDACTED]/g; s/(Bearer )[A-Za-z0-9._-]+/\1[REDACTED]/g; s/("token"\s*:\s*")[^"]+/\1[REDACTED]/g; s/("api[_-]?key"\s*:\s*")[^"]+/\1[REDACTED]/Ig; s/([?&]token=)[^& ]+/\1[REDACTED]/g'
